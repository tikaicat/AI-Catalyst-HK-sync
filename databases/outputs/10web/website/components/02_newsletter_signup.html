<!-- 
  AI Catalyst HK Newsletter 訂閱表單
  用途：10Web WordPress Custom HTML Block
  平台：可連接 Beehiiv 或 Ghost
  版本：1.0
-->

<style>
/* AI Catalyst HK 品牌變數 */
:root {
  --ach-primary: #0D47A1;
  --ach-accent: #F59E0B;
  --ach-white: #FFFFFF;
  --ach-text: #1F2937;
  --ach-muted: #F3F4F6;
  --ach-success: #10B981;
}

/* Newsletter 訂閱區塊 */
.ach-newsletter {
  background: linear-gradient(135deg, var(--ach-primary) 0%, #1565C0 100%);
  border-radius: 16px;
  padding: 48px 40px;
  margin: 40px 0;
  text-align: center;
  font-family: 'Noto Sans TC', 'Inter', -apple-system, sans-serif;
  box-shadow: 0 10px 40px rgba(13, 71, 161, 0.3);
}

.ach-newsletter__icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.ach-newsletter__title {
  color: var(--ach-white);
  font-size: 28px;
  font-weight: 700;
  margin: 0 0 8px 0;
  line-height: 1.3;
}

.ach-newsletter__subtitle {
  color: rgba(255, 255, 255, 0.85);
  font-size: 16px;
  margin: 0 0 24px 0;
  font-weight: 400;
}

.ach-newsletter__benefits {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.ach-newsletter__benefit {
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255, 255, 255, 0.9);
  font-size: 14px;
}

.ach-newsletter__benefit-icon {
  color: var(--ach-accent);
}

.ach-newsletter__form {
  display: flex;
  gap: 12px;
  max-width: 500px;
  margin: 0 auto;
}

.ach-newsletter__input {
  flex: 1;
  padding: 16px 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: box-shadow 0.2s ease;
}

.ach-newsletter__input:focus {
  box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.4);
}

.ach-newsletter__input::placeholder {
  color: #9CA3AF;
}

.ach-newsletter__button {
  background: var(--ach-accent);
  color: var(--ach-white);
  border: none;
  border-radius: 8px;
  padding: 16px 32px;
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.ach-newsletter__button:hover {
  background: #D97706;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
}

.ach-newsletter__button:active {
  transform: translateY(0);
}

.ach-newsletter__privacy {
  color: rgba(255, 255, 255, 0.7);
  font-size: 12px;
  margin-top: 16px;
}

.ach-newsletter__privacy a {
  color: var(--ach-accent);
  text-decoration: underline;
}

/* 成功訊息 */
.ach-newsletter__success {
  display: none;
  background: var(--ach-success);
  color: white;
  padding: 16px 24px;
  border-radius: 8px;
  margin-top: 16px;
  font-weight: 500;
}

.ach-newsletter__success.show {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 響應式設計 */
@media (max-width: 640px) {
  .ach-newsletter {
    padding: 32px 24px;
    margin: 24px 16px;
  }
  
  .ach-newsletter__title {
    font-size: 24px;
  }
  
  .ach-newsletter__form {
    flex-direction: column;
  }
  
  .ach-newsletter__button {
    width: 100%;
  }
  
  .ach-newsletter__benefits {
    flex-direction: column;
    gap: 12px;
  }
}
</style>

<div class="ach-newsletter">
  <div class="ach-newsletter__icon">📧</div>
  <h3 class="ach-newsletter__title">訂閱「AI實戰情報」</h3>
  <p class="ach-newsletter__subtitle">每週一次，香港中小企 AI 應用情報直送你的收件箱</p>
  
  <div class="ach-newsletter__benefits">
    <span class="ach-newsletter__benefit">
      <span class="ach-newsletter__benefit-icon">✓</span>
      每週精選 AI 工具評測
    </span>
    <span class="ach-newsletter__benefit">
      <span class="ach-newsletter__benefit-icon">✓</span>
      香港本地化實戰案例
    </span>
    <span class="ach-newsletter__benefit">
      <span class="ach-newsletter__benefit-icon">✓</span>
      免費 AI 提示詞範本
    </span>
  </div>
  
  <!-- Beehiiv 整合 - 替換 YOUR_BEEHIIV_FORM_ID -->
  <form class="ach-newsletter__form" id="achNewsletterForm" 
        action="https://embeds.beehiiv.com/YOUR_BEEHIIV_FORM_ID" 
        method="POST">
    <input 
      type="email" 
      name="email" 
      class="ach-newsletter__input" 
      placeholder="輸入你的電郵地址" 
      required
    >
    <button type="submit" class="ach-newsletter__button">
      免費訂閱
    </button>
  </form>
  
  <div class="ach-newsletter__success" id="achSuccess">
    ✅ 訂閱成功！請檢查你的電郵確認訂閱。
  </div>
  
  <p class="ach-newsletter__privacy">
    🔒 我們尊重你的私隱。隨時可以取消訂閱。
    <a href="/privacy-policy">私隱政策</a>
  </p>
</div>

<!-- 
  使用說明：
  
  1. Beehiiv 整合：
     - 登入 Beehiiv Dashboard
     - 前往 Settings > Embed > Form
     - 複製你的 Form ID
     - 替換上面的 YOUR_BEEHIIV_FORM_ID
  
  2. Ghost 整合：
     - 將 form action 改為你的 Ghost Members API endpoint
     - 例如：https://your-ghost-site.com/members/api/send-magic-link/
  
  3. 10Web 使用方法：
     - 在頁面編輯器中加入 Custom HTML Block
     - 貼上此完整代碼
     - 預覽並發布
-->
